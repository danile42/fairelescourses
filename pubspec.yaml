name: fairelescourses
description: "Fairelescourses - Shopping navigation assistant"
publish_to: 'none'

version: 0.9.21+39

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.0
  hive_ce: ^2.9.0
  hive_ce_flutter: ^2.2.0
  share_plus: ^12.0.1
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  encrypt: ^5.0.3
  crypto: ^3.0.3
  http: ^1.2.0
  flutter_map: ^8.0.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  mocktail: ^1.0.4
  build_runner: ^2.4.13
  hive_ce_generator: ^1.9.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#E8F5E9"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon.png
